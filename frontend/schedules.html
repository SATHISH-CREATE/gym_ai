<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Schedules | FIT COACH AI</title>
    <link rel="stylesheet" href="css/styles.css?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-attachment: fixed !important;
            background-image:
                radial-gradient(circle at 50% 0%, rgba(0, 240, 255, 0.15), transparent 50%),
                linear-gradient(to bottom, rgba(13, 5, 20, 0.88), rgba(9, 9, 11, 0.98)),
                url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070') !important;
        }

        .container {
            max-width: 100% !important;
            padding: 0 12px !important;
        }

        .hero-mini {
            text-align: center;
            padding: 60px 0 30px;
            background: radial-gradient(circle at center, rgba(0, 240, 255, 0.12) 0%, transparent 80%);
            border-radius: 100px;
            margin-bottom: 20px;
        }

        .hero-mini h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 30%, #00f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .schedule-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .tab-btn {
            padding: 12px 25px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .tab-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-hover);
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .schedule-card {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .schedule-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-color);
            box-shadow: 0 15px 40px rgba(112, 0, 255, 0.15);
        }

        .schedule-header {
            padding: 25px;
            background: linear-gradient(to bottom, rgba(112, 0, 255, 0.1), transparent);
            border-bottom: 1px solid var(--glass-border);
        }

        .schedule-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .schedule-header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .exercise-list {
            padding: 20px;
            flex-grow: 1;
        }

        .exercise-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .exercise-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(5px);
        }

        .exercise-img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .exercise-info h4 {
            font-size: 0.95rem;
            margin: 0;
            color: #fff;
        }

        .exercise-info span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .schedule-footer {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--glass-border);
        }

        .schedule-btn {
            width: 100%;
            justify-content: center;
        }

        .back-btn-top {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
        }

        /* Loading Animation */
        .loader {
            display: none;
            justify-content: center;
            padding: 50px;
        }

        .loader span {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: var(--primary-color);
            margin: 0 5px;
            animation: bounce 0.6s infinite alternate;
        }

        .loader span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loader span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            to {
                opacity: 0.3;
                transform: translateY(-10px);
            }
        }

        @media (max-width: 768px) {
            .hero-mini {
                padding: 40px 15px 20px;
                border-radius: 40px;
            }

            .hero-mini h1 {
                font-size: 2.2rem;
            }

            .schedule-tabs {
                flex-wrap: wrap;
                gap: 8px;
                padding: 0 10px;
                top: 10px;
            }

            .tab-btn {
                padding: 8px 15px;
                font-size: 0.8rem;
                flex: 1 1 calc(50% - 10px);
            }

            .schedule-grid {
                grid-template-columns: 1fr;
            }

            .day-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .hero-mini h1 {
                font-size: 1.8rem;
            }

            .schedule-header h2 {
                font-size: 1.2rem;
            }
        }

        /* My Schedule Custom Styles */
        .my-schedule-builder {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .search-box {
            position: relative;
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(112, 0, 255, 0.2);
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1a20;
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            margin-top: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .search-result-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-result-item:hover {
            background: var(--primary-color);
        }

        .search-result-item img {
            width: 35px;
            height: 35px;
            border-radius: 5px;
            object-fit: cover;
        }

        .btn-remove {
            color: #ff3366;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .btn-remove:hover {
            background: rgba(255, 51, 102, 0.1);
            transform: scale(1.2);
        }

        /* Category Chips for Browser */
        .category-chips-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 0 20px 0;
            scrollbar-width: none;
            /* Hide scrollbar Firefox */
        }

        .category-chips-container::-webkit-scrollbar {
            display: none;
            /* Hide scrollbar Chrome/Safari */
        }

        .cat-chip {
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .cat-chip.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(112, 0, 255, 0.3);
        }

        .cat-chip:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .browse-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            animation: fadeIn 0.3s;
        }

        .browse-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .browse-item:hover {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.05);
        }

        .browse-item img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }

        .browse-item h4 {
            font-size: 0.85rem;
            margin: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 6-Day Plan Dashboard */
        .plan-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .day-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 992px) {
            .day-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .day-grid {
                grid-template-columns: 1fr;
            }
        }

        .day-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            cursor: pointer;
        }

        .day-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .day-number {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary-color);
            font-weight: 800;
            margin-bottom: 5px;
        }

        .day-focus {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .day-stats {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge-type {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(112, 0, 255, 0.2);
            color: var(--primary-light);
            text-transform: uppercase;
            font-weight: 700;
        }

        .empty-day {
            border-style: dashed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .btn-day-edit {
            position: absolute;
            top: 15px;
            right: 15px;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <a href="dashboard.html" class="back-arrow" title="Back to Home">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                <div class="logo">FIT COACH AI</div>
            </div>
        </header>

        <section class="hero-mini">
            <h1>ELITE SCHEDULES</h1>
            <p>Scientifically designed plans for maximum results.</p>
        </section>

        <div class="schedule-tabs">
            <button class="tab-btn active" onclick="switchTab('single')">Single Muscle</button>
            <button class="tab-btn" onclick="switchTab('double')">Double Muscle</button>
            <button class="tab-btn" onclick="switchTab('fatloss')">Fat Loss & Strength</button>
            <button class="tab-btn" onclick="switchTab('my')"> My Schedule</button>
        </div>

        <div id="loader" class="loader">
            <span></span><span></span><span></span>
        </div>

        <div id="schedule-container" class="schedule-grid">
            <!-- Schedules will be injected here -->
        </div>
    </div>

    <script>
        let exerciseData = [];

        const schedules = {
            single: [
                {
                    name: "Chest Destruction",
                    desc: "Focus on mass and inner chest definition.",
                    muscle: "Chest",
                    exercises: ["Flat Barbell Bench Press", "Incline Dumbbell Press", "Pec Deck Fly", "Cable Crossover"]
                },
                {
                    name: "Back Thickness",
                    desc: "Build a wide and thick upper back.",
                    muscle: "Back",
                    exercises: ["Deadlift", "Barbell Bent-Over Rows", "Pull-ups", "Seated Cable Row"]
                },
                {
                    name: "Shoulder Boulder",
                    desc: "3D Delt development program.",
                    muscle: "Shoulders",
                    exercises: ["Overhead Barbell Press", "Dumbbell Lateral Raises", "Reverse Pec Deck", "Face Pull"]
                },
                {
                    name: "Leg Day (Hardcore)",
                    desc: "Build foundation strength and mass.",
                    muscle: "Legs",
                    exercises: ["Barbell Squats", "Bulgarian Split Squat", "Lying Leg Curl", "Standing Calf Raises"]
                },
                {
                    name: "Arm Peak",
                    desc: "Isolation focus for biceps and triceps.",
                    muscle: "Arms",
                    exercises: ["Barbell Curl", "Hammer Curl", "Skull Crushers", "Tricep Pushdown (Straight Bar)"]
                },
                {
                    name: "Core Definition",
                    desc: "Sculpt your midsection with targeted movements.",
                    muscle: "Core",
                    exercises: ["Weighted Crunch", "Hanging Leg Raises", "Russian Twists", "Ab Wheel Rollout"]
                }
            ],
            double: [
                {
                    name: "Chest & Triceps",
                    desc: "The classic push combo.",
                    muscle: "Chest / Triceps",
                    exercises: ["Flat Barbell Bench Press", "Incline Machine Press", "Skull Crushers", "Dumbbell Lateral Raises"]
                },
                {
                    name: "Back & Biceps",
                    desc: "The powerhouse pull combo.",
                    muscle: "Back / Biceps",
                    exercises: ["Pull-ups", "T-Bar Row", "Preacher Curl", "Hammer Curl"]
                },
                {
                    name: "Legs & Abs",
                    desc: "Core stability and leg power.",
                    muscle: "Legs / Core",
                    exercises: ["Leg Press", "Walking Lunges", "Hanging Leg Raises", "Plank"]
                },
                {
                    name: "Shoulders & Arms",
                    desc: "Full upper body pump and definition.",
                    muscle: "Shoulders / Arms",
                    exercises: ["Overhead Dumbbell Press", "Dumbbell Lateral Raises", "Hammer Curl", "Tricep Pushdown (Straight Bar)"]
                },
                {
                    name: "Chest & Back (Antagonist)",
                    desc: "High-intensity opposing muscle training.",
                    muscle: "Chest / Back",
                    exercises: ["Incline Dumbbell Press", "Seated Cable Row", "Chest Press Machine", "Lat Pulldown (Wide Grip)"]
                },
                {
                    name: "Legs & Glutes (Focus)",
                    desc: "Lower body mastery and power.",
                    muscle: "Legs / Glutes",
                    exercises: ["Barbell Squats", "Hip Thrust", "Lying Leg Curl", "Seated Calf Raises"]
                }
            ],
            fatloss: [
                {
                    name: "HIIT Strength Circuit",
                    desc: "Burn fat while maintaining muscle mass.",
                    muscle: "Full Body",
                    exercises: ["Thrusters", "Burpees", "Mountain Climbers", "Man Makers"]
                },
                {
                    name: "Metabolic Conditioning",
                    desc: "High volume strength training for fat loss.",
                    muscle: "Full Body",
                    exercises: ["Clean and Press", "Devil Press", "Box Jumps", "Bicycle Crunches"]
                },
                {
                    name: "Agility & Core",
                    desc: "Dynamic movements for functional fitness.",
                    muscle: "Core / Cardio",
                    exercises: ["Skater Jumps", "Plank Jacks", "Russian Twists", "Jump Lunges"]
                }
            ]
        };

        let myPlan = JSON.parse(localStorage.getItem('my_6day_plan') || '[]');
        if (myPlan.length === 0) {
            for (let i = 1; i <= 6; i++) {
                myPlan.push({ day: i, focus: "REST DAY", type: "REST", exercises: [] });
            }
        }

        let currentEditingDay = -1;
        let lastBrowsedCategory = 'all';

        async function init() {
            try {
                const response = await fetch('exercises.json');
                exerciseData = await response.json();
                renderSchedules('single');
            } catch (err) {
                console.error("Failed to load exercise data:", err);
            }
        }

        function findExercise(name) {
            for (const category of exerciseData) {
                for (const sub of category.subcategories) {
                    const ex = sub.exercises.find(e => e.name === name);
                    if (ex) return ex;
                }
            }
            return {
                name: name,
                imageUrl: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=300",
                description: "AI guidance available."
            };
        }

        function renderSchedules(type) {
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';

            schedules[type].forEach(sched => {
                const card = document.createElement('div');
                card.className = 'schedule-card';

                const exercisesExpanded = sched.exercises.map(exName => findExercise(exName));

                let exercisesHTML = exercisesExpanded.map(ex => `
                    <div class="exercise-item" onclick="startWorkout('${ex.name}')" style="cursor:pointer;">
                        <img src="${ex.imageUrl}" class="exercise-img" alt="${ex.name}">
                        <div class="exercise-info">
                            <h4>${ex.name}</h4>
                            <span>Target: ${sched.muscle}</span>
                        </div>
                        <div style="margin-left: auto; color: var(--primary-color)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
                        </div>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="schedule-header">
                        <h2>${sched.name}</h2>
                        <p>${sched.desc}</p>
                    </div>
                    <div class="exercise-list">
                        ${exercisesHTML}
                    </div>
                    <div class="schedule-footer">
                        <button onclick="startFullWorkout('${sched.name}')" class="btn btn-primary schedule-btn">START FULL SESSION</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function switchTab(type) {
            currentEditingDay = -1; // Reset editing state

            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.toLowerCase().includes(type === 'fatloss' ? 'fat' : (type === 'my' ? 'my' : type))) {
                    btn.classList.add('active');
                }
            });

            // Show loader
            const container = document.getElementById('schedule-container');
            const loader = document.getElementById('loader');
            container.style.opacity = '0';
            loader.style.display = 'flex';

            setTimeout(() => {
                if (type === 'my') {
                    renderMyPlan();
                } else {
                    renderSchedules(type);
                }
                container.style.opacity = '1';
                loader.style.display = 'none';
            }, 300);
        }



        function renderMyPlan() {
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';

            if (currentEditingDay === -1) {
                renderPlanDashboard(container);
            } else {
                renderDayEditor(container, currentEditingDay);
            }
        }

        function renderPlanDashboard(container) {
            let html = `
                <div class="my-schedule-builder" style="grid-column: 1 / -1; text-align: center;">
                    <div class="plan-header">
                        <h2 style="color: var(--primary-color);">6-DAY ELITE SPLIT</h2>
                        <p style="color: var(--text-muted);">Customizable cycle for max muscle & strength.</p>
                    </div>
                    
                    <div class="day-grid">
                        ${myPlan.map((dayData, index) => `
                            <div class="day-card ${dayData.type === 'REST' ? 'empty-day' : ''}" onclick="editDay(${index})">
                                <div class="day-focus">DAY ${dayData.day}</div>
                                ${dayData.type !== 'REST' ? `
                                    <div class="day-stats" style="margin-bottom: 15px;">
                                        <span class="badge-type">${dayData.type}</span>
                                        <span style="color: white; font-weight: 500;">${dayData.focus}</span>
                                    </div>
                                    <div class="day-exercises-list" style="display: flex; flex-direction: column; gap: 6px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px;">
                                        ${dayData.exercises.length > 0 ? dayData.exercises.map(ex => `
                                            <div style="font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px;">
                                                <div style="width: 4px; height: 4px; border-radius: 50%; background: var(--primary-color); opacity: 0.6;"></div>
                                                <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${ex}</span>
                                            </div>
                                        `).join('') : '<span style="font-size: 0.75rem; color: #444; font-style: italic;">No exercises added</span>'}
                                    </div>
                                ` : '<span style="font-size: 0.9rem; color: #666; font-weight: 600;">REST DAY</span>'}
                                <div class="btn-day-edit">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <button onclick="clearFullPlan()" class="btn glass" style="color: #666; font-size: 0.8rem;">Reset Entire Week</button>
                </div>
            `;
            container.innerHTML = html;
        }

        function renderDayEditor(container, index) {
            const dayData = myPlan[index];
            let html = `
                <div class="my-schedule-builder" style="grid-column: 1 / -1; text-align: left;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <button onclick="backToPlan()" class="btn glass" style="padding: 10px 20px;">← BACK TO WEEK</button>
                        <div style="text-align: center; flex-grow: 1;">
                            <div class="day-number" style="font-size: 0.7rem; color: var(--primary-color); font-weight:800; letter-spacing:2px; margin-bottom:5px;">SETTING UP DAY ${dayData.day}</div>
                            <input type="text" id="edit-day-focus" value="${dayData.focus === 'REST DAY' ? 'New Workout' : dayData.focus}" 
                                style="background: none; border: none; border-bottom: 2px solid var(--primary-color); color: white; font-size: 1.8rem; font-weight: 800; text-align: center; outline: none; width: 350px;"
                                onchange="updateDayFocus(${index}, this.value)">
                        </div>
                        <div style="width: 120px;"></div>
                    </div>

                    <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 30px;">
                        <button onclick="updateDayType(${index}, 'SINGLE')" class="btn ${dayData.type === 'SINGLE' ? 'btn-primary' : 'glass'}" style="padding: 8px 15px; font-size: 0.9rem;">SINGLE MUSCLE</button>
                        <button onclick="updateDayType(${index}, 'DOUBLE')" class="btn ${dayData.type === 'DOUBLE' ? 'btn-primary' : 'glass'}" style="padding: 8px 15px; font-size: 0.9rem;">DOUBLE MUSCLE</button>
                    </div>

                    <div class="search-box">
                        <input type="text" id="exercise-search" class="search-input" placeholder="Quick find variation..." oninput="handleSearch(this.value)">
                        <div id="search-results" class="search-results"></div>
                    </div>

                    <div style="margin-bottom: 25px;">
                        <div class="category-chips-container">
                            <div class="cat-chip ${(!dayData.focus || dayData.focus === 'REST DAY' || dayData.focus === 'New Workout') ? 'active' : ''}" onclick="browseCategory('all')">All</div>
                            ${exerciseData.map(cat => {
                const isActive = dayData.focus && dayData.focus.split(' & ').map(p => p.trim()).includes(cat.name);
                return `<div class="cat-chip ${isActive ? 'active' : ''}" onclick="browseCategory('${cat.name.replace(/'/g, "\\'")}')">${cat.name}</div>`;
            }).join('')}
                        </div>
                    </div>

                    <div id="browse-results" class="browse-results" style="display: none;"></div>
                    
                    <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 0.9rem; font-weight: 700; color: var(--primary-color);">ASSIGNED EXERCISES:</span>
                        <div style="flex-grow: 1; height: 1px; background: var(--glass-border);"></div>
                    </div>

                    <div class="exercise-list" id="assigned-exercises-list">
                        <!-- Assigned exercises injected here -->
                    </div>
                    
                    <div style="margin-top: 30px; text-align: center;">
                        <button onclick="backToPlan()" class="btn btn-primary" style="padding: 15px 50px; border-radius: 50px; font-weight:800; font-size: 1.1rem; width: 100%;">
                            💾 SAVE & RETURN TO WEEK
                        </button>
                    </div>
                </div>
            `;
            container.innerHTML = html;
            renderAssignedList();

            // Restore browsing state if it was active
            if (lastBrowsedCategory !== 'all') {
                browseCategory(lastBrowsedCategory, true);
            }
        }

        function renderAssignedList() {
            const listDiv = document.getElementById('assigned-exercises-list');
            if (!listDiv || currentEditingDay === -1) return;

            const dayData = myPlan[currentEditingDay];
            if (dayData.exercises.length === 0) {
                listDiv.innerHTML = '<p style="text-align:center; color: var(--text-muted); padding: 40px;">No exercises assigned yet for this day.</p>';
                return;
            }

            listDiv.innerHTML = dayData.exercises.map((exName, exIndex) => {
                const ex = findExercise(exName);
                return `
                    <div class="exercise-item">
                        <img src="${ex.imageUrl}" class="exercise-img" alt="${ex.name}">
                        <div class="exercise-info">
                            <h4>${ex.name}</h4>
                            <span>${dayData.focus}</span>
                        </div>
                        <div class="btn-remove" onclick="removeFromDay(${currentEditingDay}, ${exIndex})">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function editDay(index) {
            currentEditingDay = index;
            renderMyPlan();
        }

        function backToPlan() {
            currentEditingDay = -1;
            lastBrowsedCategory = 'all'; // Reset browsing state when going back to plan dashboard
            renderMyPlan();
        }

        function updateDayFocus(index, val) {
            myPlan[index].focus = val || "New Workout";
            if (myPlan[index].type === 'REST') myPlan[index].type = 'SINGLE';
            savePlan();
        }

        function updateDayType(index, type) {
            myPlan[index].type = type;
            // If switch to SINGLE, pick the first muscle if it was many
            if (type === 'SINGLE' && myPlan[index].focus.includes(' & ')) {
                myPlan[index].focus = myPlan[index].focus.split(' & ')[0];
            }
            savePlan();
            renderMyPlan();
        }

        function addToMyPlan(name) {
            if (currentEditingDay === -1) return;
            if (!myPlan[currentEditingDay].exercises.includes(name)) {
                myPlan[currentEditingDay].exercises.push(name);
                if (myPlan[currentEditingDay].type === 'REST') myPlan[currentEditingDay].type = 'SINGLE';
                savePlan();
                renderAssignedList();
            }
            document.getElementById('search-results').style.display = 'none';
            document.getElementById('exercise-search').value = '';
        }

        function removeFromDay(dayIndex, exIndex) {
            myPlan[dayIndex].exercises.splice(exIndex, 1);
            if (myPlan[dayIndex].exercises.length === 0) {
                myPlan[dayIndex].focus = "REST DAY";
                myPlan[dayIndex].type = "REST";
                // If focus changes, we might need a full re-render to update the header/chips
                savePlan();
                renderMyPlan();
            } else {
                savePlan();
                renderAssignedList();
            }
        }

        function savePlan() {
            localStorage.setItem('my_6day_plan', JSON.stringify(myPlan));
        }

        function clearFullPlan() {
            if (confirm("Reset current 6-day split? All assignments will be removed.")) {
                myPlan = [];
                for (let i = 1; i <= 6; i++) {
                    myPlan.push({ day: i, focus: "REST DAY", type: "REST", exercises: [] });
                }
                savePlan();
                renderMyPlan();
            }
        }

        function startDaySession(index) {
            const day = myPlan[index];
            if (day.exercises.length === 0) return;
            alert(`Ready for Day ${day.day}: ${day.focus}!`);
            startWorkout(day.exercises[0]);
        }

        function handleSearch(query) {
            const resultsDiv = document.getElementById('search-results');
            if (!query || query.length < 2) {
                resultsDiv.style.display = 'none';
                return;
            }

            const results = [];
            exerciseData.forEach(cat => {
                cat.subcategories.forEach(sub => {
                    sub.exercises.forEach(ex => {
                        if (ex.name.toLowerCase().includes(query.toLowerCase())) {
                            results.push(ex);
                        }
                    });
                });
            });

            if (results.length > 0) {
                resultsDiv.innerHTML = results.slice(0, 8).map(ex => `
                    <div class="search-result-item" onclick="addToMyPlan('${ex.name.replace(/'/g, "\\'")}')">
                        <img src="${ex.imageUrl}" alt="${ex.name}">
                        <span>${ex.name}</span>
                    </div>
                `).join('');
                resultsDiv.style.display = 'block';
            } else {
                resultsDiv.style.display = 'none';
            }
        }

        function browseCategory(catName, isRestoring = false) {
            if (catName !== 'all') lastBrowsedCategory = catName;
            else if (!isRestoring) lastBrowsedCategory = 'all';

            // Update the workout focus name if editing a day AND it's a fresh click (not restoring)
            if (currentEditingDay !== -1 && catName !== 'all' && !isRestoring) {
                const day = myPlan[currentEditingDay];
                let selection = (day.focus && day.focus !== 'REST DAY' && day.focus !== 'New Workout')
                    ? day.focus.split(' & ').map(p => p.trim())
                    : [];

                if (day.type === 'SINGLE') {
                    selection = [catName];
                } else {
                    if (selection.includes(catName)) {
                        // Toggle off if already selected
                        selection = selection.filter(p => p !== catName);
                    } else {
                        // Add new, cap at 2 for double muscle
                        selection.push(catName);
                        if (selection.length > 2) selection.shift();
                    }
                }

                day.focus = selection.join(' & ') || 'New Workout';
                if (day.type === 'REST') day.type = 'SINGLE';
                savePlan();

                // Refresh name input and active chips visually without full re-render
                const focusInput = document.getElementById('edit-day-focus');
                if (focusInput) focusInput.value = day.focus;

                document.querySelectorAll('.cat-chip').forEach(chip => {
                    const chipName = chip.innerText;
                    if (chipName === 'All') {
                        chip.classList.toggle('active', catName === 'all');
                    } else {
                        chip.classList.toggle('active', selection.includes(chipName));
                    }
                });
            } else {
                // Just update chips for pure browsing/restoring
                document.querySelectorAll('.cat-chip').forEach(chip => {
                    if (isRestoring && catName !== 'all') {
                        // Keep current focus highlights but also highlight browsing category
                        // The focus highlights are already set by renderDayEditor's initial chip rendering
                        // Here we just ensure the browsed category is also active
                        if (chip.innerText === catName) chip.classList.add('active');
                    } else {
                        chip.classList.toggle('active', chip.innerText === catName || (catName === 'all' && chip.innerText === 'All'));
                    }
                });
            }

            const browseDiv = document.getElementById('browse-results');
            if (catName === 'all') {
                browseDiv.style.display = 'none';
                return;
            }

            const filteredCat = exerciseData.find(c => c.name === catName);
            if (!filteredCat) return;

            let allEx = [];
            filteredCat.subcategories.forEach(sub => {
                allEx = allEx.concat(sub.exercises);
            });

            browseDiv.innerHTML = allEx.map(ex => `
                <div class="browse-item" onclick="addToMyPlan('${ex.name.replace(/'/g, "\\'")}')">
                    <img src="${ex.imageUrl}" alt="${ex.name}">
                    <h4>${ex.name}</h4>
                </div>
            `).join('');
            browseDiv.style.display = 'grid';
        }

        function startWorkout(name) {
            window.location.href = `workout.html?exercise=${encodeURIComponent(name)}`;
        }

        function startFullWorkout(schedName) {
            alert("Starting full session: " + schedName + ". Redirecting to first exercise...");
            const type = Object.keys(schedules).find(k => schedules[k].some(s => s.name === schedName));
            const sched = schedules[type].find(s => s.name === schedName);
            startWorkout(sched.exercises[0]);
        }

        init();
    </script>
</body>

</html>
