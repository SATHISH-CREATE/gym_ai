<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT COACH AI | Push Beyond Limits</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,300;0,400;0,500;0,700;0,900;1,900&display=swap"
        rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Outfit', sans-serif;
        }

        .landing-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(ellipse at center, rgba(112, 0, 255, 0.08) 0%, rgba(0, 0, 0, 0.75) 70%);
            pointer-events: none;
        }

        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: 0;
            filter: brightness(0.3) saturate(1.3);
        }

        .content-wrap {
            position: relative;
            z-index: 10;
            padding: 20px;
            animation: fast-zoom 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
        }

        .edition-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 20px;
            border-radius: 100px;
            border: 1px solid rgba(112, 0, 255, 0.5);
            background: rgba(112, 0, 255, 0.12);
            backdrop-filter: blur(8px);
            color: #c084fc;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .edition-tag .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #7000ff;
            box-shadow: 0 0 8px #7000ff;
            animation: blink 1.5s infinite;
        }

        .main-title {
            font-size: 8rem;
            font-weight: 900;
            color: #fff;
            margin: 0;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -5px;
            text-shadow: 0 10px 60px rgba(0, 0, 0, 0.5);
        }

        .main-title .highlight {
            display: block;
            background: linear-gradient(135deg, #7000ff, #00f0ff, #ff00c8);
            background-size: 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 4s ease infinite;
            filter: drop-shadow(0 0 30px rgba(112, 0, 255, 0.6));
            will-change: filter, transform;
        }

        .sub-text {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 25px;
            max-width: 600px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 4px;
        }



        .enter-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 40px;
            padding: 22px 65px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #7000ff, #b000ff);
            color: #fff;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s ease;
            box-shadow: 0 0 25px rgba(112, 0, 255, 0.5), 0 0 60px rgba(112, 0, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .enter-btn:hover {
            transform: scale(1.06) translateY(-3px);
            box-shadow: 0 0 40px rgba(112, 0, 255, 0.8), 0 0 100px rgba(176, 0, 255, 0.3);
        }


        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        @keyframes gradient-shift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes fast-zoom {
            0% {
                transform: scale(1.4);
                opacity: 0;
                filter: blur(20px);
            }

            100% {
                transform: scale(1);
                opacity: 1;
                filter: blur(0);
            }
        }

        /* Performance Optimization for Mobile */
        @media (max-width: 768px) {
            .content-wrap {
                animation: fast-zoom-mobile 0.8s ease-out forwards;
                filter: none !important;
            }

            @keyframes fast-zoom-mobile {
                0% {
                    transform: scale(1.1);
                    opacity: 0;
                }

                100% {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            .main-title .highlight {
                filter: none !important;
                animation: none !important;
                /* Static gradient for mobile perf */
            }

            .video-bg {
                display: none;
                /* Hide heavy video on mobile, use background from body */
            }

            body {
                background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.95)), url('assets/chest_day.png');
                background-size: cover;
                background-position: center;
            }
        }

        .trail {
            position: absolute;
            background: linear-gradient(to right, rgba(112, 0, 255, 0.6), transparent);
            height: 1px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 3.5rem;
                letter-spacing: -2px;
            }

            .sub-text {
                font-size: 0.8rem;
                letter-spacing: 2px;
            }

            .enter-btn {
                padding: 18px 45px;
                font-size: 0.95rem;
            }
        }

        /* Auth Modal (Global) */
        .auth-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(112, 0, 255, 0.2);
            border-radius: 40px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .auth-input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .auth-input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #666;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .auth-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 18px;
            color: #fff;
            font-family: 'Outfit';
            outline: none;
            transition: all 0.3s;
        }

        .auth-input:focus {
            border-color: #7000ff;
            background: rgba(112, 0, 255, 0.05);
        }

        .google-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .google-btn:hover {
            background: #fff;
            color: #000;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
            color: #444;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body>
    <div class="landing-container">
        <video class="video-bg" autoplay muted loop playsinline preload="auto" poster="assets/chest_day.png"
            id="bg-video">
            <source src="assets/generated_videoo.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>

        <div class="content-wrap">
            <div class="edition-tag"><span class="dot"></span>2026 EDITION</div>
            <h1 class="main-title">PUSH<span class="highlight">LIMITS</span></h1>
            <p class="sub-text">AI-Powered Bodybuilding &bull; Pure Performance</p>

            <button onclick="openAuthModal()" class="enter-btn">START TRAINING</button>
        </div>
    </div>

    <!-- Auth Modal Overlay -->
    <div id="authModal" class="auth-modal">
        <div class="auth-card">
            <h2 style="font-size: 2rem; font-weight: 900; margin-bottom: 10px;">WELCOME BACK</h2>
            <p style="color: #666; font-size: 0.85rem; margin-bottom: 30px;">Login to sync your training across devices
            </p>

            <button onclick="SupabaseAuth.signInWithGoogle()" class="google-btn">
                <img src="https://www.google.com/favicon.ico" width="18"> Continue with Google
            </button>

            <div class="auth-divider">OR USE EMAIL</div>

            <div id="email-flow">
                <div class="auth-input-group">
                    <label>Email Address</label>
                    <input type="email" id="auth-email" class="auth-input" placeholder="gym@pro.com">
                </div>
                <div class="auth-input-group">
                    <label>Password</label>
                    <input type="password" id="auth-password" class="auth-input" placeholder="••••••••">
                </div>
                <button onclick="handleEmailLogin()" id="auth-main-btn" class="enter-btn"
                    style="width: 100%; margin-top: 20px; padding: 18px;">SIGN IN</button>
                <p style="margin-top: 25px; font-size: 0.8rem; color: #555;">
                    New athlete? <a href="#" onclick="toggleAuthMode()" id="auth-toggle-link"
                        style="color: #7000ff; font-weight: 700; text-decoration: none;">Create Account</a>
                </p>
                <p id="auth-error" style="color: #ff4444; font-size: 0.75rem; margin-top: 15px; display: none;"></p>
            </div>

            <button onclick="closeAuthModal()"
                style="background: none; border: none; color: #444; font-size: 0.75rem; margin-top: 20px; cursor: pointer; text-decoration: underline;">BACK
                TO LANDING</button>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-auth.js"></script>
    <script>
        let isSignUpMode = false;

        window.onload = async () => {
            // Disable video on mobile to save bandwidth/CPU
            if (window.innerWidth <= 768) {
                const vid = document.getElementById('bg-video');
                if (vid) {
                    vid.pause();
                    vid.src = "";
                    vid.load();
                    vid.remove();
                }
            }

            try {
                // Auto-route if already logged in (e.g., returning from Google Auth)
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    const { data: profile } = await supabase
                        .from('profiles').select('name').eq('id', session.user.id).single();
                    window.location.href = (profile && profile.name) ? 'dashboard.html' : 'setup.html';
                    return; // Stop execution
                }
            } catch (e) {
                console.warn('Auto-login check failed:', e);
            }
        };

        async function openAuthModal() {
            try {
                const { data } = await supabase.auth.getSession();
                if (data && data.session) {
                    const { data: profile } = await supabase
                        .from('profiles').select('name').eq('id', data.session.user.id).single();
                    window.location.href = (profile && profile.name) ? 'dashboard.html' : 'setup.html';
                    return;
                }
            } catch (e) {
                console.warn('Supabase session check failed:', e);
            }
            // Always show modal — even if supabase check fails
            document.getElementById('authModal').style.display = 'flex';
        }

        function closeAuthModal() {
            document.getElementById('authModal').style.display = 'none';
        }

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-main-btn').innerText = isSignUpMode ? 'CREATE ACCOUNT' : 'SIGN IN';
            document.getElementById('auth-toggle-link').innerText = isSignUpMode ? 'Already have an account?' : 'Create Account';
            document.getElementById('authModal').querySelector('h2').innerText = isSignUpMode ? 'NEW ATHLETE' : 'WELCOME BACK';
        }

        async function handleEmailLogin() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const errorEl = document.getElementById('auth-error');
            const mainBtn = document.getElementById('auth-main-btn');

            if (!email || !password) {
                errorEl.innerText = 'Please fill in both email and password.';
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';
            mainBtn.innerText = 'AUTHENTICATING...';
            mainBtn.disabled = true;

            try {
                if (isSignUpMode) {
                    const data = await SupabaseAuth.signUpEmail(email, password);
                    // Check if they were automatically logged in
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) {
                        window.location.href = 'setup.html'; // Direct to profile setup
                    } else {
                        // Fallback in case email verification is still required by Supabase
                        alert("Account created! Please check your email to verify your account, then sign in.");
                        mainBtn.innerText = 'CREATE ACCOUNT';
                        mainBtn.disabled = false;
                    }
                } else {
                    await SupabaseAuth.signInEmail(email, password);
                    // Check if profile exists → go to dashboard or setup
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) {
                        const { data: profile } = await supabase
                            .from('profiles').select('name').eq('id', session.user.id).single();
                        window.location.href = (profile && profile.name) ? 'dashboard.html' : 'setup.html';
                    }
                }
            } catch (error) {
                errorEl.innerText = error.message;
                errorEl.style.display = 'block';
                mainBtn.innerText = isSignUpMode ? 'CREATE ACCOUNT' : 'SIGN IN';
                mainBtn.disabled = false;
            }
        }

        // Only run trail effect on desktop for performance
        if (window.innerWidth > 768) {
            setInterval(() => {
                const trail = document.createElement('div');
                trail.className = 'trail';
                trail.style.top = Math.random() * 100 + '%';
                trail.style.left = '-200px';
                trail.style.width = (100 + Math.random() * 300) + 'px';
                document.body.appendChild(trail);
                const anim = trail.animate([
                    { left: '-200px', opacity: 0 },
                    { left: '50%', opacity: 0.5 },
                    { left: '100%', opacity: 0 }
                ], { duration: 1000 + Math.random() * 1000 });
                anim.onfinish = () => trail.remove();
            }, 300); // Slower frequency
        }


    </script>
</body>

</html>
