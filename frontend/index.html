<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT COACH AI | Push Beyond Limits</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,300;0,400;0,500;0,700;0,900;1,900&display=swap"
        rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Outfit', sans-serif;
        }

        .landing-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(ellipse at center, rgba(112, 0, 255, 0.08) 0%, rgba(0, 0, 0, 0.75) 70%);
            pointer-events: none;
        }

        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: 0;
            filter: brightness(0.3) saturate(1.3);
        }

        .content-wrap {
            position: relative;
            z-index: 2;
            padding: 20px;
            animation: fast-zoom 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .edition-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 20px;
            border-radius: 100px;
            border: 1px solid rgba(112, 0, 255, 0.5);
            background: rgba(112, 0, 255, 0.12);
            backdrop-filter: blur(8px);
            color: #c084fc;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .edition-tag .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #7000ff;
            box-shadow: 0 0 8px #7000ff;
            animation: blink 1.5s infinite;
        }

        .main-title {
            font-size: 8rem;
            font-weight: 900;
            color: #fff;
            margin: 0;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -5px;
            text-shadow: 0 10px 60px rgba(0, 0, 0, 0.5);
        }

        .main-title .highlight {
            display: block;
            background: linear-gradient(135deg, #7000ff, #00f0ff, #ff00c8);
            background-size: 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 4s ease infinite;
            filter: drop-shadow(0 0 30px rgba(112, 0, 255, 0.6));
        }

        .sub-text {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 25px;
            max-width: 600px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .enter-btn {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            margin-top: 55px;
            padding: 22px 65px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #7000ff, #b000ff);
            color: #fff;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s ease;
            box-shadow: 0 0 25px rgba(112, 0, 255, 0.5), 0 0 60px rgba(112, 0, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .enter-btn .btn-arrow {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -75%;
            width: 50%;
            height: 200%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s ease;
        }

        .enter-btn:hover::before {
            left: 125%;
        }

        .enter-btn:hover {
            transform: scale(1.06) translateY(-3px);
            box-shadow: 0 0 40px rgba(112, 0, 255, 0.8), 0 0 100px rgba(176, 0, 255, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .enter-btn:hover .btn-arrow {
            transform: translateX(6px);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        @keyframes gradient-shift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes fast-zoom {
            0% {
                transform: scale(1.4);
                opacity: 0;
                filter: blur(40px);
            }

            100% {
                transform: scale(1);
                opacity: 1;
                filter: blur(0);
            }
        }

        .trail {
            position: absolute;
            background: linear-gradient(to right, rgba(112, 0, 255, 0.6), transparent);
            height: 1px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 3.5rem;
                letter-spacing: -2px;
            }

            .sub-text {
                font-size: 0.8rem;
                letter-spacing: 2px;
            }

            .enter-btn {
                padding: 18px 45px;
                font-size: 0.95rem;
                letter-spacing: 2px;
            }

            .edition-tag {
                font-size: 0.65rem;
                letter-spacing: 2px;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 2.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="landing-container">
        <video class="video-bg" autoplay muted loop playsinline>
            <source src="assets/generated_videoo.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>

        <div class="content-wrap">
            <div class="edition-tag"><span class="dot"></span>2026 EDITION</div>
            <h1 class="main-title">PUSH<span class="highlight">LIMITS</span></h1>
            <p class="sub-text">AI-Powered Bodybuilding &bull; Pure Performance</p>
            <a href="setup.html" class="enter-btn">START TRAINING<span class="btn-arrow">→</span></a>
        </div>
    </div>

    <script>
        // Create random speed trails
        setInterval(() => {
            const trail = document.createElement('div');
            trail.className = 'trail';
            trail.style.top = Math.random() * 100 + '%';
            trail.style.left = '-200px';
            trail.style.width = (100 + Math.random() * 300) + 'px';
            document.body.appendChild(trail);

            const anim = trail.animate([
                { left: '-200px', opacity: 0 },
                { left: '50%', opacity: 0.5 },
                { left: '100%', opacity: 0 }
            ], { duration: 500 + Math.random() * 500 });

            anim.onfinish = () => trail.remove();
        }, 100);
    </script>
</body>

</html>
