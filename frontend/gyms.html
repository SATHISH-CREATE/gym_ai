<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEARBY GYMS | FIT COACH AI</title>
    <link rel="stylesheet" href="css/styles.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <style>
        :root {
            --primary-glow: rgba(112, 0, 255, 0.4);
            --accent-glow: rgba(0, 240, 255, 0.4);
        }

        body {
            background-attachment: scroll !important;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 100% !important;
            margin: 0 !important;
            padding: 0 20px !important;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Map Container */
        .map-section {
            flex: 1;
            position: relative;
            margin: 10px 0;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
            background: #0d0514;
        }

        /* Search Overlay */
        .search-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 500px;
        }

        .search-inner {
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        #address-results::-webkit-scrollbar {
            width: 5px;
        }
        #address-results::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 5px;
        }

        .search-inner input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            padding: 8px 0;
        }

        .search-inner input:focus {
            outline: none;
        }

        .search-inner svg {
            color: var(--primary-color);
        }

        /* Results Panel */
        .results-panel {
            background: rgba(13, 5, 20, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            border-radius: 40px 40px 0 0;
            height: 40vh;
            overflow-y: auto;
            padding: 25px;
            transition: height 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .panel-handle {
            width: 40px;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: -10px auto 15px;
            cursor: pointer;
        }

        .gym-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .gym-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .gym-card:hover {
            background: rgba(112, 0, 255, 0.1);
            border-color: var(--primary-color);
            transform: translateY(-3px);
        }

        .gym-card img {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            object-fit: cover;
        }

        .gym-info {
            flex: 1;
        }

        .gym-info h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
            font-weight: 800;
        }

        .gym-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .rating {
            color: #fbbf24;
            font-weight: 700;
        }

        .distance {
            color: var(--accent-color);
            font-weight: 700;
        }

        .status {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            font-weight: 800;
        }

        /* Filter Chips */
        .filter-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: none;
            margin-bottom: 5px;
        }

        .filter-chip {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            white-space: nowrap;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(112, 0, 255, 0.4);
        }

        /* Floating Navigation Button */
        .nav-fab {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7000ff, #00f0ff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            z-index: 1001;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .nav-fab:hover {
            transform: scale(1.1);
        }

        /* Custom Marker */
        .user-marker {
            background: var(--accent-color);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .gym-marker {
            background: var(--primary-color);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
        }

        @media (max-width: 768px) {
            .results-panel {
                height: 45vh;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header style="padding: 30px 0; display: flex; align-items: center; justify-content: space-between;">
            <div class="logo-container" style="gap: 20px;">
                <a href="dashboard.html" class="back-arrow" style="width: 50px; height: 50px;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                </a>
                <div class="logo" style="font-size: 1.8rem;">GYM FINDER</div>
            </div>
            <div id="location-status"
                style="font-size: 0.8rem; color: var(--accent-color); font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);">
                📍 READY FOR SEARCH</div>
        </header>

        <div class="map-section">
            <div class="search-overlay">
                <div class="search-inner">
                    <button onclick="detectUserLocation()" title="Use my location"
                        style="background: none; border: none; cursor: pointer; padding: 5px; display: flex; align-items: center;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2.5">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
                        </svg>
                    </button>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                    <input type="text" id="gym-search" placeholder="Enter door no, street, area, city...">
                    <button onclick="handleSearch()"
                        style="background: var(--primary-color); color: white; border: none; padding: 5px 15px; border-radius: 10px; font-weight: 800; cursor: pointer;">SEARCH</button>
                </div>
            </div>

            <div id="map"></div>

            <div class="nav-fab" onclick="detectUserLocation()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <circle cx="12" cy="12" r="10" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
            </div>
        </div>

        <div class="results-panel">
            <div class="panel-handle"></div>

            <div class="filter-strip">
                <div class="filter-chip active">All Gyms</div>
                <div class="filter-chip">Open Now</div>
                <div class="filter-chip">24 Hours</div>
                <div class="filter-chip">Premium</div>
                <div class="filter-chip">Price: Low to High</div>
                <div class="filter-chip">Women Only</div>
            </div>

            <div id="gym-list" class="gym-list">
                <!-- Injected via JS -->
                <div style="padding: 40px; text-align: center; color: var(--text-muted); width: 100%;">
                    <div style="font-size: 2.5rem; margin-bottom: 15px;">📍</div>
                    <p style="font-size: 1.1rem; font-weight: 600;">Detecting your location...</p>
                    <p style="font-size: 0.85rem; opacity: 0.7; margin-top: 8px;">Or click a city below to search</p>
                    <div style="margin-top: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
                        <button onclick="quickSearch('Bangalore')" style="background: rgba(112,0,255,0.3); border: 1px solid var(--primary-color); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem;">Bangalore</button>
                        <button onclick="quickSearch('Mumbai')" style="background: rgba(112,0,255,0.3); border: 1px solid var(--primary-color); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem;">Mumbai</button>
                        <button onclick="quickSearch('Delhi')" style="background: rgba(112,0,255,0.3); border: 1px solid var(--primary-color); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem;">Delhi</button>
                        <button onclick="quickSearch('Chennai')" style="background: rgba(112,0,255,0.3); border: 1px solid var(--primary-color); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem;">Chennai</button>
                        <button onclick="quickSearch('Hyderabad')" style="background: rgba(112,0,255,0.3); border: 1px solid var(--primary-color); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem;">Hyderabad</button>
                        <button onclick="quickSearch('Kolkata')" style="background: rgba(112,0,255,0.3); border: 1px solid var(--primary-color); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem;">Kolkata</button>
                        <button onclick="quickSearch('Pune')" style="background: rgba(112,0,255,0.3); border: 1px solid var(--primary-color); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem;">Pune</button>
                        <button onclick="quickSearch('Ahmedabad')" style="background: rgba(112,0,255,0.3); border: 1px solid var(--primary-color); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem;">Ahmedabad</button>
                        <button onclick="quickSearch('Jaipur')" style="background: rgba(112,0,255,0.3); border: 1px solid var(--primary-color); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem;">Jaipur</button>
                        <button onclick="quickSearch('Lucknow')" style="background: rgba(112,0,255,0.3); border: 1px solid var(--primary-color); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem;">Lucknow</button>
                        <button onclick="quickSearch('Chandigarh')" style="background: rgba(112,0,255,0.3); border: 1px solid var(--primary-color); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem;">Chandigarh</button>
                        <button onclick="quickSearch('Kochi')" style="background: rgba(112,0,255,0.3); border: 1px solid var(--primary-color); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem;">Kochi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet Routing Machine JS -->
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script src="js/gyms.js?v=6"></script>
</body>

</html>
