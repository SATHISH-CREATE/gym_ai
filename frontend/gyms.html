<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEARBY GYMS | FIT COACH AI</title>
    <link rel="stylesheet" href="css/styles.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <style>
        :root {
            --primary-glow: rgba(112, 0, 255, 0.4);
            --accent-glow: rgba(0, 240, 255, 0.4);
            --sidebar-width: 420px;
        }

        body {
            background-attachment: fixed !important;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            background-color: #0d0514;
            background-image: linear-gradient(to bottom, rgba(13, 5, 20, 0.8), rgba(9, 9, 11, 0.95)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070');
            background-size: cover;
            background-position: center;
        }

        .container {
            max-width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        header {
            padding: 20px 30px !important;
            background: rgba(13, 5, 20, 0.45);
            backdrop-filter: blur(15px);
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 1.5rem !important;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        .back-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--primary-color);
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-arrow:hover {
            background: rgba(112, 0, 255, 0.1);
            border-color: var(--primary-color);
            transform: translateX(-3px);
        }

        #location-status {
            font-size: 0.75rem;
            color: var(--accent-color);
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        .gym-finder-layout {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        /* Results Panel / Sidebar */
        .results-sidebar {
            width: var(--sidebar-width);
            min-width: 0;
            max-width: 100%;
            background: rgba(13, 5, 20, 0.65);
            backdrop-filter: blur(25px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
            overflow: hidden;
            height: 100%;
        }

        .results-content {
            flex: 1;
            min-height: 0;
            overflow-y: scroll;
            overflow-x: hidden;
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        .results-content::-webkit-scrollbar {
            width: 5px;
        }

        .results-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .results-content::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }

        /* Map Section */
        .map-section {
            flex: 1;
            position: relative;
            background: transparent;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Search Overlay */
        .search-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 500px;
        }

        .search-inner {
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 6px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .search-inner input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 10px 0;
            outline: none;
        }

        .search-inner svg {
            color: var(--primary-color);
        }

        .search-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        .location-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            color: var(--accent-color);
            transition: transform 0.2s;
        }

        .location-btn:hover {
            transform: scale(1.2);
        }

        /* Results Panel Handle (Mobile Only) */
        .panel-handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 12px auto 5px;
            cursor: pointer;
            flex-shrink: 0;
            display: none;
        }

        .gym-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .gym-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
        }

        .gym-card:hover {
            background: rgba(112, 0, 255, 0.08);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), 0 0 15px rgba(112, 0, 255, 0.1);
        }

        .gym-card img {
            width: 80px;
            height: 80px;
            min-width: 80px;
            border-radius: 14px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .gym-info {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .gym-info h3 {
            font-size: 0.95rem;
            margin-bottom: 4px;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .gym-info p {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        /* Filter Chips */
        .filter-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 5px;
            scrollbar-width: none;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .filter-strip::-webkit-scrollbar {
            display: none;
        }

        .filter-chip {
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            white-space: nowrap;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
        }

        /* Floating Navigation Button */
        .nav-fab {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7000ff, #00f0ff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            z-index: 1001;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-fab:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 15px 35px rgba(0, 240, 255, 0.4);
        }

        .quick-city-btn {
            background: rgba(112, 0, 255, 0.15);
            border: 1px solid rgba(112, 0, 255, 0.3);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .quick-city-btn:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        /* Marker Styles */
        .user-marker {
            background: var(--accent-color);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-color);
        }

        /* Leaflet Background Overrides */
        .leaflet-container {
            background: transparent !important;
        }

        /* Leaflet Popup Customization */
        .leaflet-popup-content-wrapper,
        .leaflet-popup-tip {
            background: rgba(26, 26, 46, 0.9) !important;
            backdrop-filter: blur(10px) !important;
            color: #fff !important;
            border: 1px solid var(--glass-border) !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7) !important;
            border-radius: 15px !important;
        }

        .leaflet-popup-content {
            margin: 12px 15px !important;
        }

        .leaflet-popup-close-button {
            color: #fff !important;
            padding: 8px !important;
        }

        /* =====================================================
           RESPONSIVE BREAKPOINTS — ALL SCREEN SIZES
           ===================================================== */

        /* --- Tablet & Mobile: bottom-sheet sidebar --- */
        @media (max-width: 1024px) {
            :root {
                --sidebar-width: 100%;
            }

            header {
                padding: 14px 20px !important;
            }

            .gym-finder-layout {
                flex-direction: column;
            }

            /* Map fills the full screen */
            .map-section {
                position: absolute;
                inset: 0;
                height: 100%;
                width: 100%;
            }

            /* Sidebar becomes a slide-up bottom sheet */
            .results-sidebar {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                height: 52vh;
                min-height: 200px;
                border-right: none;
                border-top: 1px solid var(--glass-border);
                border-radius: 24px 24px 0 0;
                transform: translateY(0);
                box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.6);
                z-index: 30;
            }

            /* Collapsed: only the handle + 45px peek stays visible */
            .results-sidebar.collapsed {
                transform: translateY(calc(100% - 55px));
            }

            /* Show the drag handle on mobile */
            .panel-handle {
                display: block;
            }

            /* FAB sits above the bottom sheet */
            .nav-fab {
                position: fixed;
                bottom: calc(52vh + 16px);
                right: 18px;
                width: 46px;
                height: 46px;
                z-index: 40;
            }

            /* Move FAB down when panel is collapsed */
            .results-sidebar.collapsed+.map-section .nav-fab,
            .gym-finder-layout:has(.results-sidebar.collapsed) .nav-fab {
                bottom: 70px;
            }

            .search-overlay {
                top: 12px;
                width: 92%;
                max-width: 100%;
            }

            .gym-card {
                padding: 12px;
                border-radius: 16px;
                gap: 12px;
            }

            .gym-card img {
                width: 68px;
                height: 68px;
                min-width: 68px;
                border-radius: 12px;
            }

            .gym-info h3 {
                font-size: 0.9rem;
            }

            .results-content {
                padding: 14px 16px 80px;
            }
        }

        /* --- Small Mobile (≤600px) --- */
        @media (max-width: 600px) {
            header {
                padding: 12px 16px !important;
            }

            .logo {
                font-size: 1.1rem !important;
                letter-spacing: 1px;
            }

            .back-arrow {
                width: 38px;
                height: 38px;
            }

            /* Hide status text on very small screens — saves space */
            #location-status {
                display: none;
            }

            .search-overlay {
                top: 10px;
                width: 94%;
            }

            .search-inner {
                padding: 5px 10px;
                gap: 6px;
                border-radius: 16px;
            }

            .search-inner input {
                font-size: 0.82rem;
                padding: 8px 0;
            }

            /* Hide the search magnifier icon to save space */
            .search-inner>svg:not(:first-child) {
                display: none;
            }

            .search-btn {
                padding: 7px 11px;
                font-size: 0.68rem;
                border-radius: 10px;
                white-space: nowrap;
            }

            .results-sidebar {
                height: 50vh;
                border-radius: 20px 20px 0 0;
            }

            .results-sidebar.collapsed {
                transform: translateY(calc(100% - 50px));
            }

            .nav-fab {
                bottom: calc(50vh + 14px);
                right: 14px;
                width: 42px;
                height: 42px;
            }

            .gym-card {
                padding: 10px;
                gap: 10px;
                border-radius: 14px;
            }

            .gym-card img {
                width: 60px;
                height: 60px;
                min-width: 60px;
                border-radius: 10px;
            }

            .gym-info h3 {
                font-size: 0.85rem;
            }

            .gym-info p {
                font-size: 0.72rem !important;
            }

            /* Smaller action buttons inside cards */
            .route-btn-small,
            .maps-btn-small {
                padding: 4px 9px !important;
                font-size: 0.6rem !important;
            }

            .results-content {
                padding: 12px 12px 70px;
            }
        }

        /* --- Extra-Small (≤380px — small Android phones) --- */
        @media (max-width: 380px) {
            .logo {
                font-size: 1rem !important;
            }

            .back-arrow {
                width: 34px;
                height: 34px;
            }

            .search-btn {
                padding: 6px 9px;
                font-size: 0.65rem;
            }

            .gym-card img {
                width: 52px;
                height: 52px;
                min-width: 52px;
            }

            .results-sidebar {
                height: 48vh;
            }

            .nav-fab {
                bottom: calc(48vh + 12px);
                width: 40px;
                height: 40px;
            }

            .nav-fab svg {
                width: 20px;
                height: 20px;
            }
        }

        /* --- Large Desktop (≥1400px) --- */
        @media (min-width: 1400px) {
            :root {
                --sidebar-width: 460px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <a href="dashboard.html" class="back-arrow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                </a>
                <div class="logo">GYM FINDER</div>
            </div>
            <div id="location-status">
                📍 READY FOR SEARCH</div>
        </header>

        <div class="gym-finder-layout">
            <aside class="results-sidebar" id="results-sidebar">
                <div class="panel-handle" onclick="toggleSidebar()"></div>
                <div class="results-content">
                    <div id="gym-list" class="gym-list">
                        <div style="padding: 100px 40px; text-align: center; color: var(--text-muted); width: 100%;">
                            <div style="font-size: 4rem; margin-bottom: 25px; filter: grayscale(1); opacity: 0.3;">📍
                            </div>
                            <p style="font-size: 1.1rem; font-weight: 600; color: #fff;">Searching for nearby gyms...
                            </p>
                            <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.6;">Enter an address or use your
                                current location to start.</p>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="map-section">
                <div class="search-overlay">
                    <div class="search-inner">
                        <button onclick="detectUserLocation()" title="Use my location" class="location-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)"
                                stroke-width="2.5">
                                <circle cx="12" cy="12" r="3" />
                                <path d="M12 2v4M12 18v4M2 12h4M18 12h4" />
                            </svg>
                        </button>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="3">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.3-4.3" />
                        </svg>
                        <input type="text" id="gym-search" placeholder="Search area, street or city...">
                        <button onclick="handleSearch()" class="search-btn">SEARCH</button>
                    </div>
                </div>

                <div id="map"></div>

            </main>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet Routing Machine JS -->
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script src="js/gyms.js?v=7"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('results-sidebar');
            if (window.innerWidth <= 1024) {
                sidebar.classList.toggle('collapsed');
            }
        }
    </script>
</body>

</html>
